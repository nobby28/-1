/* ── AI SYSTEM PROMPT ── */
const SYS=`あなたは薬局の仕切書から医薬品情報を抽出する専門家です。
画像の仕切書を分析し、以下のJSON形式のみで出力してください（説明・コメント不要）:

{
  "type": "ksk" または "alfresa" または "unknown",
  "delivery_date": "YYYY/MM/DD",
  "items": [
    {
      "jan": "コード文字列",
      "name": "品名",
      "qty": 数量,
      "unit_price": 単価,
      "expiry": "期限"
    }
  ]
}

## KSK（ケーエスケー）納品仕切書:
- 右上に「株式会社ケーエスケー」と記載、タイトルは「納品仕切書」
- delivery_date: 「発行年月日」の日付をYYYY/MM/DD形式で
- 各商品行:
  - jan: 「商品コード」欄の数字（そのまま文字列で）
  - name: 品名
  - qty: 数量（整数）
  - unit_price: 単価（単価欄なければ金額÷数量を計算）
  - expiry: 「製造番号」欄の年月部分（例:"20260800001"→"2026/08", "17460 2026/08"→"2026/08"）

## アルフレッサ仕切書:
- 右上に「alfresa」または「アルフレッサ」と記載、タイトルは「仕切書」
- delivery_date: 「年月日」欄の日付をYYYY/MM/DD形式で
- 各商品行（メーカー名・取扱区分列の2行分が1商品）:
  - jan: 「メーカー名・取扱区分」列の先頭行にある13桁の数字
  - name: 「品名・規格・容量」列の値
  - qty: 数量（整数）
  - unit_price: 単価（数値）
  - expiry: 「備考」列末尾のYY/MM（例:"K00700 28/06"→"28/06"）

数値は数値型で。読み取れない場合はnull。`;

/* ── IMAGE COMPRESSION ── */
async function compressImage(file,maxPx=2048,quality=0.85){
  return new Promise(resolve=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let{width:w,height:h}=img;
      if(w>maxPx||h>maxPx){
        if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}
        else{w=Math.round(w*maxPx/h);h=maxPx;}
      }
      const cv=document.createElement('canvas');
      cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cv.toBlob(blob=>resolve(new File([blob],'img.jpg',{type:'image/jpeg'})),'image/jpeg',quality);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);resolve(file);};
    img.src=url;
  });
}

/* ── AI CALL ── */
async function extractInvoice(base64,mediaType,apiKey,model){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),90000);
  let res;
  try{
    res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      credentials:'omit',
      signal:ctrl.signal,
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-allow-browser':'true',
      },
      body:JSON.stringify({
        model:model||'claude-sonnet-4-6',
        max_tokens:4096,
        system:SYS,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
          {type:'text',text:'この仕切書からデータを抽出してください。'},
        ]}]
      })
    });
  }catch(fe){
    clearTimeout(tid);
    if(fe.name==='AbortError') throw new Error('タイムアウト: 90秒経過。再試行してください');
    throw new Error('接続エラー: Anthropic APIに繋がりません。ページを再読み込みして再試行してください ('+fe.message+')');
  }
  clearTimeout(tid);
  if(!res.ok){
    const e=await res.json().catch(()=>({error:{message:res.statusText}}));
    const msg=e.error?.message||res.statusText;
    throw new Error(`[HTTP ${res.status}] ${msg}`);
  }
  const d=await res.json();
  const raw=(d.content||[]).map(b=>b.text||'').join('');
  const match=raw.match(/\{[\s\S]*\}/);
  if(!match) throw new Error('AIの応答にJSONが見つかりません: '+raw.slice(0,120));
  try{return JSON.parse(match[0]);}
  catch(pe){throw new Error('JSON解析エラー: '+pe.message+' / 応答: '+raw.slice(0,80));}
}

function fileToB64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

/* ── EXCEL EXPORT ── */
function exportToExcel(items){
  if(!items.length){alert('データがありません');return;}
  const maxD=Math.max(1,...items.map(i=>i.deliveries.length));
  const hdr=['品名','JAN'];
  for(let i=1;i<=maxD;i++) hdr.push(`納入日${i}`,`数量${i}`,`単価${i}`,`期限${i}`);
  const rows=[hdr];
  for(const item of items){
    const row=[item.name||'',item.jan||''];
    for(let i=0;i<maxD;i++){
      const d=item.deliveries[i];
      if(d) row.push(d.date||'',d.qty??'',d.unitPrice??'',d.expiry||'');
      else row.push('','','','');
    }
    rows.push(row);
  }
  const ws=window.XLSX.utils.aoa_to_sheet(rows);
  const colW=[{wch:28},{wch:16}];
  for(let i=0;i<maxD;i++) colW.push({wch:12},{wch:7},{wch:9},{wch:8});
  ws['!cols']=colW;
  // Style header row
  const wb=window.XLSX.utils.book_new();
  window.XLSX.utils.book_append_sheet(wb,ws,'薬剤表');
  const date=new Date().toLocaleDateString('ja-JP').replace(/\//g,'');
  window.XLSX.writeFile(wb,`薬剤表_${date}.xlsx`);
}

  useEffect(()=>{const id=setTimeout(()=>remove(t.id),3800);return()=>clearTimeout(id);},[]);
  const bg=t.type==='err'?C.red:t.type==='warn'?C.amber:C.green;

    background:bg,color:'#fff',borderRadius:12,

    h('span',null,t.msg)

}

/* ── SCAN TAB ── */
function ScanTab({apiKey,model,onScanned}){
  const[mode,setMode]=useState('idle');
  const[preview,setPreview]=useState(null);
  const[capFile,setCapFile]=useState(null);
  const[err,setErr]=useState(null);
  const vidRef=useRef(),streamRef=useRef(),fileRef=useRef();

  const stop=useCallback(()=>{
    streamRef.current?.getTracks().forEach(t=>t.stop());streamRef.current=null;
  },[]);
  useEffect(()=>()=>stop(),[stop]);

  const startCam=async()=>{
    setErr(null);
    try{
      const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920}}});
      streamRef.current=s;setMode('camera');
      setTimeout(()=>{if(vidRef.current)vidRef.current.srcObject=s;},100);
    }catch{setErr('カメラへのアクセスが拒否されました。ブラウザの設定を確認してください。');}
  };

  const snap=useCallback(()=>{
    if(!vidRef.current)return;
    const cv=document.createElement('canvas');
    cv.width=vidRef.current.videoWidth;cv.height=vidRef.current.videoHeight;
    cv.getContext('2d').drawImage(vidRef.current,0,0);
    cv.toBlob(blob=>{
      const f=new File([blob],'cap.jpg',{type:'image/jpeg'});
      setCapFile(f);setPreview(cv.toDataURL('image/jpeg'));
      stop();setMode('preview');
    },'image/jpeg',0.92);
  },[stop]);

  const pickImg=f=>{setCapFile(f);setPreview(URL.createObjectURL(f));setMode('preview');setErr(null);};

  const analyze=async()=>{
    if(!capFile)return;
    if(!apiKey){setErr('設定タブでAnthropicのAPIキーを入力してください');return;}
    setMode('analyzing');setErr(null);
    try{
      const compressed=await compressImage(capFile);
      const b64=await fileToB64(compressed);
      const result=await extractInvoice(b64,'image/jpeg',apiKey,model);
      if(!result.items?.length)throw new Error('商品情報が読み取れませんでした（0件）');
      onScanned(result);reset();
    }catch(e){
      const msg=e.message||'不明なエラー';
      let userMsg;
      if(msg.startsWith('接続エラー')||msg.includes('Failed to fetch')||msg.includes('NetworkError'))
        userMsg='接続エラー: Anthropic APIに繋がりません。\n①ページを再読み込みして再試行\n②ネット接続を確認してください';
      else if(msg.startsWith('タイムアウト')) userMsg=msg;
      else if(msg.startsWith('[HTTP 401]')) userMsg='APIキーエラー: 設定タブで正しいAnthropicキーを入力してください';
      else if(msg.startsWith('[HTTP 4')||msg.startsWith('[HTTP 5]')) userMsg='APIエラー: '+msg;
      else userMsg='読み取りエラー: '+msg;
      setErr(userMsg);
      setMode('preview');
    }
  };

  const reset=()=>{
    stop();setMode('idle');setPreview(null);setCapFile(null);setErr(null);
    if(fileRef.current)fileRef.current.value='';
  };

  const camBtn=style=>h('button',{onClick:startCam,style:{
    background:C.surface,border:`2px solid ${C.border}`,borderRadius:16,
    padding:'28px 12px',cursor:'pointer',
    display:'flex',flexDirection:'column',alignItems:'center',gap:12,
    WebkitUserSelect:'none',...style,
  }},
    h('span',{style:{fontSize:48}},'📷'),
    h('span',{style:{fontWeight:700,fontSize:15,color:C.text,fontFamily:F}},'カメラ撮影')
  );

  return h('div',{style:{flex:1,overflowY:'auto',padding:'16px 16px calc(80px + env(safe-area-inset-bottom))'}},
    err&&h('div',{className:'fade-up',style:{
      background:'#3a1515',border:`1px solid ${C.red}55`,borderRadius:12,
      padding:'12px 16px',fontSize:13,color:C.red,marginBottom:16,lineHeight:1.6,
    }},`⚠ ${err}`),

    mode==='idle'&&h(Fragment,null,
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}},
        h('button',{onClick:startCam,style:{
          background:C.surface,border:`2px solid ${C.border}`,borderRadius:16,
          padding:'28px 12px',cursor:'pointer',
          display:'flex',flexDirection:'column',alignItems:'center',gap:12,
          WebkitUserSelect:'none',
        }},
          h('span',{style:{fontSize:48}},'📷'),
          h('span',{style:{fontWeight:700,fontSize:15,color:C.text,fontFamily:F}},'カメラ撮影')
        ),
        h('button',{onClick:()=>fileRef.current?.click(),style:{
          background:C.surface,border:`2px solid ${C.border}`,borderRadius:16,
          padding:'28px 12px',cursor:'pointer',
          display:'flex',flexDirection:'column',alignItems:'center',gap:12,
          WebkitUserSelect:'none',
        }},
          h('span',{style:{fontSize:48}},'🖼️'),
          h('span',{style:{fontWeight:700,fontSize:15,color:C.text,fontFamily:F}},'画像を選択')
        )
      ),
      h('input',{ref:fileRef,type:'file',accept:'image/*',
        onChange:e=>{if(e.target.files[0])pickImg(e.target.files[0]);},
        style:{display:'none'},
      }),
      h(Card,{style:{padding:'20px',textAlign:'center'}},
        h('div',{style:{fontSize:36,marginBottom:10}},'💊'),
        h('div',{style:{fontWeight:800,fontSize:15,color:C.text,marginBottom:8,fontFamily:F}},'仕切書スキャン'),
        h('p',{style:{fontSize:13,color:C.textMid,lineHeight:1.9,fontFamily:F}},
          'KSK・アルフレッサの仕切書を撮影すると',h('br'),
          'AIが自動でJAN・期限・納入日を抽出します',h('br'),h('br'),
          h('b',{style:{color:C.greenLight}},'KSK:'),' 発行年月日→納入日、商品コード→JAN、製造番号の年月→期限',h('br'),
          h('b',{style:{color:C.sky}},'アルフレッサ:'),' 年月日→納入日、メーカー名の13桁→JAN、備考の年月→期限'
        )
      )
    ),

    mode==='camera'&&h('div',{style:{position:'relative',borderRadius:16,overflow:'hidden',background:'#000',marginBottom:16}},
      h('video',{ref:vidRef,autoPlay:true,playsInline:true,muted:true,
        style:{width:'100%',maxHeight:'60vh',objectFit:'cover',display:'block'}}),
      h('div',{style:{position:'absolute',inset:0,border:'3px dashed rgba(74,124,89,0.8)',borderRadius:16,pointerEvents:'none'}}),
      h('div',{style:{position:'absolute',bottom:16,left:0,right:0,display:'flex',justifyContent:'center',gap:12}},
        h(Btn,{onClick:snap,color:C.green,lg:true},'📸 撮影'),
        h(Btn,{onClick:reset,ghost:true,color:C.textMid},'✕ キャンセル')
      )
    ),

    mode==='preview'&&h('div',{className:'fade-up'},
      h('div',{style:{borderRadius:16,overflow:'hidden',marginBottom:16,border:`2px solid ${C.green}`}},
        h('img',{src:preview,style:{width:'100%',maxHeight:'60vh',objectFit:'contain',display:'block',background:'#111'}})
      ),
      h('div',{style:{display:'flex',gap:10}},
        h(Btn,{onClick:analyze,color:C.green,full:true,lg:true},'🔍 AIで読み取る'),
        h(Btn,{onClick:reset,ghost:true,color:C.textMid},'✕')
      )
    ),

    mode==='analyzing'&&h('div',{style:{textAlign:'center',padding:'60px 0'}},
      h('div',{style:{fontSize:60,display:'inline-block',animation:'spin 1.1s linear infinite'}},'⚙️'),
      h('div',{style:{fontWeight:800,fontSize:18,color:C.text,marginTop:18,fontFamily:F}},'AIが解析中...'),
      h('div',{style:{color:C.textMid,fontSize:14,marginTop:8}},'仕切書の種類を判定してデータを抽出しています')
    )
  );
}

/* ── REVIEW MODAL ── */
function ReviewModal({result,onConfirm,onClose}){
  const typeLabel=result.type==='ksk'?'KSK（ケーエスケー）':result.type==='alfresa'?'アルフレッサ':'不明';
  const typeColor=result.type==='ksk'?C.sky:result.type==='alfresa'?C.green:C.textMid;
  const[items,setItems]=useState(()=>result.items.map(it=>({...it,_on:true})));

  const toggle=i=>setItems(p=>p.map((r,j)=>j===i?{...r,_on:!r._on}:r));
  const setF=(i,k,v)=>setItems(p=>p.map((r,j)=>j===i?{...r,[k]:v}:r));
  const checked=items.filter(r=>r._on);

  return h('div',{style:{
    position:'fixed',inset:0,zIndex:200,
    background:'rgba(0,0,0,0.8)',backdropFilter:'blur(4px)',
    display:'flex',flexDirection:'column',justifyContent:'flex-end',
  }},
    h('div',{className:'fade-up',style:{
      background:C.bgCard,borderRadius:'20px 20px 0 0',
      maxHeight:'90vh',display:'flex',flexDirection:'column',
      paddingBottom:'env(safe-area-inset-bottom)',
    }},
      h('div',{style:{display:'flex',justifyContent:'center',padding:'12px 0 0'}},
        h('div',{style:{width:40,height:4,borderRadius:2,background:C.border}})
      ),
      h('div',{style:{padding:'12px 18px 14px',borderBottom:`1px solid ${C.border}`}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
          h('div',{style:{fontWeight:800,fontSize:16,color:C.text,fontFamily:F}},'📄 読み取り結果確認'),
          h('button',{onClick:onClose,style:{background:'transparent',border:'none',fontSize:22,cursor:'pointer',color:C.textLight,lineHeight:1}},'×')
        ),
        h('div',{style:{display:'flex',gap:8,marginTop:8,flexWrap:'wrap',alignItems:'center'}},
          h(Badge,{color:typeColor},typeLabel),

              flexShrink:0,width:24,height:24,borderRadius:6,marginTop:1,

                ),
                h(Field,{label:'単価(円)'},
                  h(TxtInput,{value:it.unit_price,onChange:e=>setF(i,'unit_price',parseFloat(e.target.value)||0),type:'number',disabled:!it._on})

}

/* ── TABLE TAB ── */
function TableTab({items,onEdit,onDelete}){
  const[search,setSearch]=useState('');
  const filtered=useMemo(()=>{
    if(!search)return items;
    const q=search.toLowerCase();
    return items.filter(i=>(i.name||'').toLowerCase().includes(q)||(i.jan||'').toLowerCase().includes(q));
  },[items,search]);

  if(!items.length)return h('div',{style:{
    flex:1,display:'flex',alignItems:'center',justifyContent:'center',
    flexDirection:'column',gap:16,padding:32,paddingBottom:80,
  }},
    h('div',{style:{fontSize:60}},'💊'),
    h('div',{style:{fontWeight:700,fontSize:16,color:C.textMid,textAlign:'center',fontFamily:F,lineHeight:1.8}},
      '仕切書をスキャンすると',h('br'),'ここに薬剤表が表示されます'
    )
  );

  return h('div',{style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}},
    h('div',{style:{padding:'12px 16px',background:C.bgCard,borderBottom:`1px solid ${C.border}`}},
      h('div',{style:{position:'relative'}},
        h('span',{style:{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:16,pointerEvents:'none'}},'🔍'),
        h('input',{value:search,onChange:e=>setSearch(e.target.value),placeholder:'品名・JANで検索...',
          style:{width:'100%',padding:'9px 12px 9px 34px',borderRadius:10,
            border:`1px solid ${C.border}`,background:C.surface,color:C.text,fontSize:14,fontFamily:F,outline:'none'}})
      )
    ),
    h('div',{style:{flex:1,overflowY:'auto',padding:'10px 16px',paddingBottom:'calc(80px + env(safe-area-inset-bottom))'}},
      h('div',{style:{fontSize:11,color:C.textLight,marginBottom:8,fontFamily:F}},`${filtered.length}品目`),
      h('div',{style:{display:'flex',flexDirection:'column',gap:10}},
        filtered.map((item,idx)=>h(ItemCard,{key:item.jan||idx,item,
          onEdit:()=>onEdit(item),
          onDelete:()=>{if(confirm(`「${item.name}」を削除しますか？`))onDelete(item.jan);}
        }))
      )
    )
  );
}

function ItemCard({item,onEdit,onDelete}){
  const[open,setOpen]=useState(false);
  return h(Card,{style:{overflow:'visible'}},
    h('div',{style:{padding:'12px 14px',cursor:'pointer'},onClick:()=>setOpen(p=>!p)},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}},
        h('div',{style:{flex:1,minWidth:0}},
          h('div',{style:{fontWeight:700,fontSize:14,color:C.text,fontFamily:F,marginBottom:5,
            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},item.name||'—'),
          h('div',{style:{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}},
            h(Badge,{color:C.sky},`JAN: ${item.jan||'—'}`),
            h(Badge,{color:C.textMid},`${item.deliveries.length}回納入`)
          )
        ),
        h('div',{style:{display:'flex',gap:6,flexShrink:0,alignItems:'center'}},
          h('button',{onClick:e=>{e.stopPropagation();onEdit();},style:{
            background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,
            padding:'5px 10px',cursor:'pointer',fontSize:13,color:C.textMid,
          }},'✏️'),
          h('button',{onClick:e=>{e.stopPropagation();onDelete();},style:{
            background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,
            padding:'5px 10px',cursor:'pointer',fontSize:13,color:C.red,
          }},'🗑'),
          h('span',{style:{color:C.textMid,fontSize:14}},open?'▲':'▼')
        )
      )
    ),
    open&&h('div',{style:{borderTop:`1px solid ${C.border}`,overflowX:'auto',padding:'10px 14px'}},
      h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:12,fontFamily:F,minWidth:300}},
        h('thead',null,h('tr',null,
          ['納入日','数量','単価','期限'].map(c=>h('th',{key:c,style:{
            padding:'5px 8px',textAlign:c==='数量'||c==='単価'?'right':'left',
            color:C.textLight,fontWeight:600,borderBottom:`1px solid ${C.border}`,whiteSpace:'nowrap',
          }},c))
        )),
        h('tbody',null,item.deliveries.map((d,i)=>h('tr',{key:i,style:{
          background:i%2===0?'transparent':C.surface+'44',
        }},
          h('td',{style:{padding:'6px 8px',color:C.text,whiteSpace:'nowrap'}},d.date||'—'),
          h('td',{style:{padding:'6px 8px',color:C.text,textAlign:'right'}},d.qty??'—'),
          h('td',{style:{padding:'6px 8px',color:C.text,textAlign:'right'}},
            d.unitPrice!=null?`¥${Number(d.unitPrice).toLocaleString()}`:'—'),
          h('td',{style:{padding:'6px 8px',color:C.greenLight,fontWeight:600}},d.expiry||'—')
        )))
      )
    )
  );
}

/* ── EDIT MODAL ── */
function EditModal({item,onSave,onClose}){
  const[name,setName]=useState(item.name||'');
  const[jan,setJan]=useState(item.jan||'');
  const[deliveries,setDeliveries]=useState(()=>item.deliveries.map(d=>({...d})));

  const setDel=(i,k,v)=>setDeliveries(p=>p.map((d,j)=>j===i?{...d,[k]:v}:d));
  const delDel=i=>setDeliveries(p=>p.filter((_,j)=>j!==i));
  const addDel=()=>setDeliveries(p=>[...p,{date:'',qty:0,unitPrice:0,expiry:''}]);

  return h('div',{style:{
    position:'fixed',inset:0,zIndex:200,
    background:'rgba(0,0,0,0.8)',backdropFilter:'blur(4px)',
    display:'flex',flexDirection:'column',justifyContent:'flex-end',
  }},
    h('div',{className:'fade-up',style:{
      background:C.bgCard,borderRadius:'20px 20px 0 0',
      maxHeight:'90vh',display:'flex',flexDirection:'column',
      paddingBottom:'env(safe-area-inset-bottom)',
    }},
      h('div',{style:{display:'flex',justifyContent:'center',padding:'12px 0 0'}},
        h('div',{style:{width:40,height:4,borderRadius:2,background:C.border}})
      ),
      h('div',{style:{padding:'12px 18px 14px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}},
        h('div',{style:{fontWeight:800,fontSize:16,color:C.text,fontFamily:F}},'✏️ 薬剤情報を編集'),
        h('button',{onClick:onClose,style:{background:'transparent',border:'none',fontSize:22,cursor:'pointer',color:C.textLight,lineHeight:1}},'×')
      ),
      h('div',{style:{overflowY:'auto',flex:1,padding:'16px',display:'flex',flexDirection:'column',gap:12}},
        h(Field,{label:'品名'},
          h(TxtInput,{value:name,onChange:e=>setName(e.target.value)})
        ),
        h(Field,{label:'JAN / 商品コード'},
          h(TxtInput,{value:jan,onChange:e=>setJan(e.target.value)})
        ),
        h('div',{style:{fontWeight:700,fontSize:14,color:C.text,fontFamily:F,marginTop:4}},'納入記録'),
        h('div',{style:{display:'flex',flexDirection:'column',gap:8}},
          deliveries.map((d,i)=>h(Card,{key:i,style:{padding:'12px'}},
            h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
              h('span',{style:{fontSize:12,color:C.textMid,fontFamily:F}},`第${i+1}回`),
              h('button',{onClick:()=>delDel(i),style:{background:'transparent',border:'none',color:C.red,cursor:'pointer',fontSize:16,lineHeight:1}},'×')
            ),
            h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
              h(Field,{label:'納入日'},
                h(TxtInput,{value:d.date,onChange:e=>setDel(i,'date',e.target.value),placeholder:'YYYY/MM/DD'})
              ),
              h(Field,{label:'期限'},
                h(TxtInput,{value:d.expiry,onChange:e=>setDel(i,'expiry',e.target.value),placeholder:'YY/MM'})
              ),
              h(Field,{label:'数量'},
                h(TxtInput,{value:d.qty,onChange:e=>setDel(i,'qty',parseFloat(e.target.value)||0),type:'number'})
              ),
              h(Field,{label:'単価'},
                h(TxtInput,{value:d.unitPrice,onChange:e=>setDel(i,'unitPrice',parseFloat(e.target.value)||0),type:'number'})
              )
            )
          ))
        ),
        h(Btn,{onClick:addDel,ghost:true,color:C.green,full:true},'＋ 納入記録を追加')
      ),
      h(Divider),
      h('div',{style:{padding:'14px 16px',display:'flex',gap:10}},
        h(Btn,{onClick:onClose,ghost:true,color:C.textMid},'キャンセル'),
        h(Btn,{onClick:()=>onSave({...item,name,jan,deliveries}),color:C.green,full:true,lg:true},'保存')
      )
    )
  );
}

/* ── SETTINGS TAB ── */

  const[key,setKey]=useState(apiKey);
  const[show,setShow]=useState(false);
  const[mdl,setMdl]=useState(model);

  return h('div',{style:{flex:1,overflowY:'auto',padding:'16px',paddingBottom:'calc(80px + env(safe-area-inset-bottom))'}},
    // API Key
    h(Card,{style:{padding:'18px',marginBottom:14}},
      h('div',{style:{fontWeight:800,fontSize:15,color:C.text,marginBottom:3,fontFamily:F}},'🔑 Anthropic APIキー'),
      h('div',{style:{fontSize:12,color:C.textMid,marginBottom:12,lineHeight:1.7}},
        'anthropic.com → Console → API Keys から取得',h('br'),
        'キーは端末内にのみ保存されます'
      ),
      h('div',{style:{display:'flex',gap:8,marginBottom:10}},
        h('input',{type:show?'text':'password',value:key,onChange:e=>setKey(e.target.value),placeholder:'sk-ant-...',
          style:{flex:1,padding:'10px 12px',borderRadius:10,border:`1px solid ${C.border}`,
            background:C.surface,color:C.text,fontSize:13,fontFamily:F,outline:'none'}}),
        h(Btn,{onClick:()=>setShow(p=>!p),ghost:true,color:C.textMid,sm:true},show?'🙈':'👁')
      ),
      h(Btn,{onClick:()=>onSaveKey(key),color:C.green,full:true},'保存する')
    ),
    // Model
    h(Card,{style:{padding:'18px',marginBottom:14}},
      h('div',{style:{fontWeight:800,fontSize:15,color:C.text,marginBottom:10,fontFamily:F}},'🤖 AIモデル'),
      h('select',{value:mdl,onChange:e=>setMdl(e.target.value),
        style:{width:'100%',padding:'10px 12px',borderRadius:10,
          border:`1px solid ${C.border}`,background:C.surface,color:C.text,fontSize:13,fontFamily:F,
          marginBottom:10,outline:'none'}},
        h('option',{value:'claude-sonnet-4-6'},'claude-sonnet-4-6（推奨・高速）'),
        h('option',{value:'claude-opus-4-8'},'claude-opus-4-8（高精度・低速）')
      ),
      h(Btn,{onClick:()=>onSaveModel(mdl),color:C.green,full:true},'保存する')
    ),
    // Export
    h(Card,{style:{padding:'18px',marginBottom:14}},
      h('div',{style:{fontWeight:800,fontSize:15,color:C.text,marginBottom:3,fontFamily:F}},'📊 薬剤表エクスポート'),
      h('div',{style:{fontSize:12,color:C.textMid,marginBottom:12}},
        `${items.length}品目 → Excelダウンロード`,h('br'),
        '同じJANは1行にまとめ、納入日・数量・単価・期限を横に並べます'
      ),
      h(Btn,{onClick:onExport,color:C.sky,full:true,disabled:!items.length},'⬇ Excel (.xlsx) でダウンロード')
    ),
    // Clear
    h(Card,{style:{padding:'18px'}},
      h('div',{style:{fontWeight:800,fontSize:15,color:C.text,marginBottom:3,fontFamily:F}},'🗑️ データ全削除'),
      h('div',{style:{fontSize:12,color:C.textMid,marginBottom:12}},'登録された全薬剤データを削除します（復元不可）'),
      h(Btn,{onClick:()=>{if(confirm('全データを削除しますか？この操作は取り消せません。'))onClearAll();},
        color:C.red,full:true,ghost:true},'全データを削除')
    ),
    h('div',{style:{marginTop:20,textAlign:'center',fontSize:11,color:C.textLight,fontFamily:F,lineHeight:1.8}},
      '薬剤仕切書スキャンシステム',h('br'),'KSK・アルフレッサ対応'
    )
  );
}

/* ── APP ── */
function App(){
  const[tab,setTab]=useState('scan');
  const[store,setStore]=useState(loadStore);
  const[toasts,setToasts]=useState([]);
  const[scanned,setScanned]=useState(null);
  const[editing,setEditing]=useState(null);

  const toast=(msg,type='ok')=>setToasts(p=>[...p,{id:Date.now()+Math.random(),msg,type}]);
  const removeToast=id=>setToasts(p=>p.filter(t=>t.id!==id));
  const update=useCallback(s=>{setStore(s);saveStore(s);},[]);

  const handleConfirm=(checkedItems,deliveryDate)=>{
    const s={...store,items:[...store.items]};
    let added=0,updated=0;
    for(const it of checkedItems){
      const delivery={date:deliveryDate,qty:it.qty,unitPrice:it.unit_price,expiry:it.expiry};
      const existing=s.items.find(x=>x.jan&&x.jan===String(it.jan));
      if(existing){
        existing.deliveries=[...existing.deliveries,delivery];
        updated++;
      }else{
        s.items=[...s.items,{jan:String(it.jan||''),name:it.name||'',deliveries:[delivery]}];
        added++;
      }
    }
    update(s);setScanned(null);
    toast(`${added}件追加、${updated}件更新しました`);
    setTab('table');
  };

  const handleSaveEdit=edited=>{
    update({...store,items:store.items.map(i=>i.jan===edited.jan?edited:i)});
    setEditing(null);toast('更新しました');
  };

  const handleDelete=jan=>{
    update({...store,items:store.items.filter(i=>i.jan!==jan)});
    toast('削除しました','warn');
  };

  return h('div',{style:{height:'100vh',display:'flex',flexDirection:'column',background:C.bg,overflowX:'hidden'}},
    h(ToastLayer,{toasts,remove:removeToast}),

    h('header',{style:{
      background:C.surface,borderBottom:`1px solid ${C.border}`,
      padding:`calc(env(safe-area-inset-top) + 10px) 16px 10px`,
      display:'flex',alignItems:'center',gap:12,flexShrink:0,
    }},
      h('div',{style:{width:38,height:38,borderRadius:10,background:C.green,
        display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}},'💊'),
      h('div',null,
        h('div',{style:{fontWeight:900,fontSize:17,color:C.text,fontFamily:F,letterSpacing:'-0.3px'}},'薬剤仕切書スキャン'),
        h('div',{style:{fontSize:11,color:C.textLight}},`${store.items.length}品目登録中`)
      )
    ),

    h('div',{style:{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}},
      tab==='scan'&&h(ScanTab,{apiKey:store.apiKey,model:store.model,onScanned:setScanned}),
      tab==='table'&&h(TableTab,{items:store.items,onEdit:setEditing,onDelete:handleDelete}),
      tab==='settings'&&h(SettingsTab,{
        apiKey:store.apiKey,model:store.model,
        onSaveKey:key=>{update({...store,apiKey:key});toast('APIキーを保存しました');},
        onSaveModel:m=>{update({...store,model:m});toast('モデルを変更しました');},
        items:store.items,
        onExport:()=>{exportToExcel(store.items);toast('Excelをダウンロードしました');},
        onClearAll:()=>{update({...store,items:[]});toast('全データを削除しました','warn');},
      })
    ),

    scanned&&h(ReviewModal,{result:scanned,onConfirm:handleConfirm,onClose:()=>setScanned(null)}),
    editing&&h(EditModal,{item:editing,onSave:handleSaveEdit,onClose:()=>setEditing(null)}),

    h(BottomNav,{active:tab,onChange:setTab})
  );
}

createRoot(document.getElementById('root')).render(h(App));
</script>
